<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沒有網際網路</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f2f2f2;
      font-family: 'Noto Sans TC', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #202124;
    }

    /* ── 固定在左上角的超醒目返回按鈕 ── */
    .back-fixed {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 999;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(26,115,232,0.45);
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: pulse-btn 2s infinite;
    }
    .back-fixed:hover {
      background: #1558b0;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,115,232,0.6);
      animation: none;
    }
    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 4px 14px rgba(26,115,232,0.45); }
      50%       { box-shadow: 0 4px 22px rgba(26,115,232,0.75); }
    }
    body {
      background: #f2f2f2;
      font-family: 'Noto Sans TC', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #202124;
    }
    .dino {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 24px;
      animation: dino-walk 1.5s steps(2, end) infinite;
      user-select: none;
    }
    @keyframes dino-walk {
      0%   { transform: scaleX(1); }
      50%  { transform: scaleX(1) translateY(-4px); }
      100% { transform: scaleX(1); }
    }
    h1 {
      font-size: 26px;
      font-weight: 400;
      color: #202124;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .error-code {
      font-size: 13px;
      color: #70757a;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }
    .desc {
      font-size: 14px;
      color: #70757a;
      max-width: 380px;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-row {
      display: flex;
      gap: 12px;
    }
    .btn {
      padding: 9px 22px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-back {
      background: #fff;
      color: #1a73e8;
      border: 1px solid #dadce0;
    }
    .btn-back:hover { background: #f8f9fa; }
    .btn-reload {
      background: #1a73e8;
      color: #fff;
    }
    .btn-reload:hover { background: #1765cc; }
    .tip {
      margin-top: 48px;
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- 固定左上角返回按鈕 -->
  <button class="back-fixed" onclick="window.history.back()">
    &#8592; 返回上一頁
  </button>

  <div class="dino">🦕</div>
  <h1>沒有網際網路連線</h1>
  <div class="error-code">ERR_INTERNET_DISCONNECTED</div>
  <p class="desc">
    嘗試執行以下操作：<br>
    ‧ 檢查網路連線<br>
    ‧ 檢查代理伺服器和防火牆設定
  </p>
  <div class="btn-row">
    <button class="btn btn-back" onclick="window.history.back()">← 返回上一頁</button>
    <button class="btn btn-reload" onclick="window.history.back()">重新整理</button>
  </div>
  <div class="tip">Wakipedia · ERR_NETWORK_CHANGED</div>
</body>
</html>
